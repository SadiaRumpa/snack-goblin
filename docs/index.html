<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Snack Goblin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-grid"></div>
    <div id="flash-overlay"></div>

    <div id="ui-layer">
        <div id="score-display">0</div>
        <div id="combo-display" style="display:none;"></div>
        <div id="lives-display">❤️❤️❤️</div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
        <div class="glass-panel">
            <h1>👾 Snack Goblin</h1>
            <p class="subtitle">Drag to move! Collect snacks, dodge veggies.</p>
            <div class="legend">
                <span>🍪 🥤 🍟 🍰 = <b>+10 pts</b></span>
                <span>🥦 🌶️ 🥕 = <b>-1 Life</b></span>
                <span>🛡️ = <b>Shield</b></span>
                <span>⚡ = <b>Speed Burst</b></span>
                <span>⭐ = <b>2x Score</b></span>
            </div>
            <div id="high-score-display">Global Best: 0</div>
            <button id="start-btn" class="btn-primary">START MUNCHING</button>
            <button id="view-leaderboard-btn" class="btn-secondary">🏆 VIEW LEADERBOARD</button>
        </div>
    </div>

    <!-- Leaderboard Modal (New) -->
    <div id="leaderboard-modal" class="overlay" style="display: none;">
        <div class="glass-panel">
            <h1>🌍 GLOBAL TOP 10</h1>
            <div id="modal-leaderboard" class="leaderboard"></div>
            <button id="close-leaderboard-btn" class="btn-primary">BACK</button>
        </div>
    </div>

    <!-- Name Input Screen -->
    <div id="name-input-screen" class="overlay" style="display: none;">
        <div class="glass-panel">
            <h1>🏆 NEW HIGH SCORE!</h1>
            <p class="subtitle">You scored <span id="new-high-score" class="highlight">0</span> points!</p>
            <input type="text" id="player-name" placeholder="Enter your name" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false">
            <button id="save-score-btn" class="btn-primary" type="button">SAVE SCORE</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay" style="display: none;">
        <div class="glass-panel">
            <h1>GAME OVER 💀</h1>
            <p class="subtitle">Final Score: <span id="final-score" class="highlight">0</span></p>
            <div id="final-leaderboard" class="leaderboard"></div>
            <button id="restart-btn" class="btn-primary" type="button">TRY AGAIN</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

            <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script src="game.js"></script>
</body>
</html>
